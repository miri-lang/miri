name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM/Clang 21.1.8 (apt.llvm.org)
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common ca-certificates

          wget -O- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list

          sudo apt-get update

          CANDIDATE="$(apt-cache madison clang-21 | awk '{print $3}' | head -n1)"
          echo "Candidate clang-21: $CANDIDATE"
          echo "$CANDIDATE" | grep -q '21\.1\.8'

          sudo apt-get install -y \
            clang-21="$CANDIDATE" \
            llvm-21="$CANDIDATE" \
            llvm-21-dev="$CANDIDATE" \
            libclang-21-dev="$CANDIDATE" \
            libpolly-21-dev="$CANDIDATE"

          clang-21 --version
          llvm-config-21 --version

      - name: Run linting (fmt & clippy)
        run: make lint

      - name: Build project (debug)
        run: make build

      - name: Build project (release)
        run: make release

      - name: Run tests
        run: make test

  gpu-browser-gate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies for Dawn build
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3 \
            git

      - name: Cache tint binary
        id: cache-tint
        uses: actions/cache@v3
        with:
          path: ~/tint-build
          key: tint-immutable-sha-${{ runner.os }}-c7ed440
          restore-keys: |
            tint-immutable-sha-${{ runner.os }}-

      - name: Build tint from Dawn (pinned immutable revision)
        if: steps.cache-tint.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/tint-build
          cd ~/tint-build

          # Dawn standalone repo, pinned to an immutable full commit SHA
          # (tip of branch chromium/6099 = Chrome M120, 2023-12). The old
          # chromium/src/third_party/dawn mirror path is gone; googlesource
          # fetches an arbitrary commit only by its full 40-char SHA.
          DAWN_SHA=c7ed440d75861649d8a1ef4b775384f31211d902
          if [ ! -d "dawn/.git" ]; then
            git init dawn
          fi
          cd dawn
          git remote add origin https://dawn.googlesource.com/dawn 2>/dev/null \
            || git remote set-url origin https://dawn.googlesource.com/dawn
          git fetch --depth 1 origin "$DAWN_SHA"
          git checkout -q FETCH_HEAD

          # Fetch Dawn's third_party dependencies without depot_tools (CMake runs
          # the bundled tools/fetch_dawn_dependencies.py), then build only the
          # tint CLI. The CMake target is tint_cmd_tint_cmd; its output name is
          # "tint".
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDAWN_FETCH_DEPENDENCIES=ON \
            -DTINT_BUILD_CMD_TOOLS=ON \
            -DDAWN_BUILD_SAMPLES=OFF \
            -DDAWN_BUILD_TESTS=OFF \
            -DTINT_BUILD_TESTS=OFF

          cmake --build build -t tint_cmd_tint_cmd

          # Expose the built binary at a stable, cache-restored path.
          TINT_BIN="$(find build -type f -name tint | head -n1)"
          test -x "$TINT_BIN"
          cp "$TINT_BIN" ~/tint-build/tint
          ~/tint-build/tint --version || true

      - name: Run GPU browser validation gate
        shell: bash
        run: |
          export MIRI_TINT="$HOME/tint-build/tint"
          test -x "$MIRI_TINT" || { echo "tint not found at $MIRI_TINT"; exit 1; }
          make gpu-browser-check
